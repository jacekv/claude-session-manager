<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
  <title>Claude Session Manager</title>
  <link rel="stylesheet" href="../../../node_modules/@xterm/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <button id="rename-session-btn" title="Rename selected session">&#9998;</button>
      </div>
      <ul id="session-list"></ul>
      <button id="new-session-btn">+ New Session</button>
    </aside>
    <main id="terminal-container">
      <div id="terminal-panel"></div>
      <div id="empty-state">
        <p>No session selected</p>
        <p class="hint">Click "+ New Session" to start</p>
      </div>
    </main>
    <div id="status-bar"></div>
  </div>
  <script src="../../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../../../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="layoutTree.js"></script>
  <script src="terminal.js"></script>
  <script src="paneManager.js"></script>
  <script src="appState.js"></script>
  <script src="statusBar.js"></script>
  <script src="app.js"></script>
</body>
</html>
